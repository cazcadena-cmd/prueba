<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#000;
    height:100%;
    font-family: sans-serif;
}

/* VIDEO */
#videoContainer iframe{
    width:100%;
    height:100vh;
    border:none;
    margin-top: -27px;
}

/* Para cuando el fondo es Imagen */
#videoContainer img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    display: block;
}

/* BOTÓN ADMIN */
.admin-btn{
    position:fixed;
    top:20px;
    right:10px;
    width:46px;
    height:46px;
    border-radius:12px;
    background:linear-gradient(180deg, #ff6f48 0%, #f4436f 100%);
    border:none;
    cursor:pointer;
    z-index:999;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
}

/* =========================================================
   NUEVO: LÓGICA DE FONDOS SEMITRANSPARENTES PARA MODALES
   ========================================================= */
/* Quitamos el background directo y preparamos el pseudo-elemento */
#adminModal, #imageModal, #reserveModal, #infoModal {
    background: transparent !important; /* Importante para que se vea el ::before */
    /* Crea un contexto de apilamiento para que el z-index -1 funcione relativo al modal */
    isolation: isolate; 
}

/* Pseudo-elemento que actúa como fondo con opacidad */
#adminModal::before, 
#imageModal::before, 
#reserveModal::before, 
#infoModal::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Usa la variable controlada por JS, con un fallback negro */
    background: var(--modal-bg, rgba(0, 0, 0, 0.85)); 
    /* AQUÍ ESTÁ LA MAGIA: Opacidad siempre al 90% (0.9) */
    opacity: 0.7; 
    z-index: -1; /* Se coloca detrás del contenido del modal */
    border-radius: inherit; /* Hereda las curvas del modal padre */
    pointer-events: none; /* Permite clicks a través si fuera necesario */
}
/* ========================================================= */


/* MODAL ADMIN (TOP) */
.modal{
    position:fixed;
    top:-100%;
    left:0;
    width:100%;
    /* background:rgba(0, 0, 0, 0.5);  <-- ELIMINADO, AHORA LO MANEJA ::before */
    padding:18px;
    box-shadow:0 20px 40px rgba(0,0,0,.6);
    transition:.4s ease;
    z-index:1000;
}

.modal.active{
    top:0;
}

/* MODAL DE IMAGEN (IZQUIERDA A DERECHA) */
#imageModal {
    position: fixed;
    top: 30;
    left: 0;
    width: 80%;
    height: 78%; 
    border-radius: 0 24px 24px 0;
    /* background: rgba(0, 0, 0, 0.5); <-- ELIMINADO */
    z-index: 2000; 
    display: flex;
    align-items: center; 
    justify-content: center; 
    
    transform: translateX(-100%); 
    transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    opacity: 0;
}

#imageModal.active {
    transform: translateX(0); 
    opacity: 1;
}

/* Estilo de la Imagen dentro del Modal */
#imageModal img {
    max-width: 100%;  
    max-height: 90%; 
    border-radius: 20px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    object-fit: contain;
}

.modal-box{
    max-width:350px;
    width:100%;
    margin: auto;
    padding: 0 12px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.modal-box input,
.modal-box button{
    padding:12px;
    border-radius:10px;
    border:none;
}

.modal-box input{
    background:#2a2a2a;
    color:#fff;
}

.modal-box button{
    background:#ff5a5f;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.close-btn{
    background:#333 !important;
}

.warning{
    color:#ffb84d;
    font-size:13px;
    display:none;
}
.warning.show{ display:block; }

*{
    box-sizing:border-box;
}

.modal-title{
    color:#fff;
    font-size:20px;
    font-weight:600;
    text-align:center;
    margin-bottom:6px;
}

.modal-actions{
    display:flex;
    gap:10px;
}

.modal-actions button{
    flex:1;
}
  
.bottom-container{
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(180deg, #ff6f48 0%, #f4436f 100%);
    border-radius: 22px 22px 0 0;
    z-index: 997;
    pointer-events: auto;
}
  
.bottom-icons{
    height:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.icon{
    width:46px;
    height:46px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.icon svg{
    width:30px;
    height:30px;
    fill:#fff;
}

/* ANIMACIÓN ENTRADA ICONOS */
@keyframes dropDown {
    0%{
        transform: translateY(-25px);
        opacity: 0;
    }
    100%{
        transform: translateY(0);
        opacity: 1;
    }
}

.icon{
    opacity:0;
    animation: dropDown 0.6s ease-out forwards;
}

.icon:nth-child(1){ animation-delay: .1s; }
.icon:nth-child(2){ animation-delay: .2s; }
.icon:nth-child(3){ animation-delay: .3s; }
.icon:nth-child(4){ animation-delay: .4s; }

.change-title{
    color:#fff;
    font-size:14px;
    font-weight:500;
    text-align:center;
    display:none;
    margin-bottom:6px;
}
  
#colorPalette{
    display:flex;
    justify-content:center;
}

.color{
    width:36px;
    height:36px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid #fff;
}
  
/* BOTÓN CERRAR MODAL IMAGEN */
.close-image{
    position:absolute;
    top:15px;
    right:20px;
    font-size:32px;
    font-weight:bold;
    color:#fff;
    cursor:pointer;
    z-index:2100;
    user-select:none;
    transition: transform .2s ease, opacity .2s ease;
}

.close-image:hover{
    transform: scale(1.15);
    opacity:0.8;
}

/* ===== MODAL RESERVAS (DERECHA A IZQUIERDA) ===== */
#reserveModal{
    position: fixed;
    top: 30px;
    right: 0;
    width: 50%;
    height: 78%;
    border-radius: 24px 0 0 24px;
    /* background: rgba(0, 0, 0, 0.5); <-- ELIMINADO */
    z-index: 3000;
    padding: 25px;
    transform: translateX(100%);
    transition: transform .5s ease;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

#reserveModal.active{
    transform: translateX(0);
}

#reserveModal h2{
    color: #fff;
    text-align: center;
    margin-bottom: 10px;
}

.reserve-input{
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: #fff;
}
  
  ::placeholder{
    font-size: 13px;
    opacity: 0.7;
}

.reserve-btn{
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(180deg, #ff6f48 0%, #f4436f 100%);
}

.close-reserve{
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
}
  
  .reserve-label{
    color:#fff;
    font-size:13px;
    opacity:0.8;
    margin-left:4px;
}

/* ===== MODAL HORARIO (INFO) DESDE ABAJO ===== */
#infoModal {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    min-height: 180px;
    /* background: rgba(0, 0, 0, 0.85); <-- ELIMINADO */
    border-radius: 30px 30px 30px 30px; 
    z-index: 4000; 
    padding: 25px;
    transform: translateY(100%); 
    transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
}

#infoModal.active {
    transform: translateY(-85px); 
}

#infoModal h2 {
    font-size: 22px;
    margin: 0 0 10px 0;
}

#infoModal p {
    font-size: 14px;
    margin: 0 0 25px 0;
    opacity: 0.9;
}

.social-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.social-btn {
    color: #fff;
    background: rgba(255, 255, 255, 0.1);
    padding: 10px;
    border-radius: 12px;
    transition: transform 0.2s, background 0.2s;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.social-btn:hover {
    transform: scale(1.1);
    background: rgba(255, 255, 255, 0.2);
}

.close-info {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 24px;
    cursor: pointer;
    opacity: 0.7;
}

  
  /* BOTÓN PROMOCIÓN */

.promo-btn{
    position:absolute;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
    
    padding:6px 25px;
    min-width:200px;
    border:1px solid rgba(255,255,255,0.8);
    border-radius:16px;
    
    font-size:18px;
    font-weight:700;
    color:#fff;
    
    background:inherit; /* hereda el color del sistema */
    
    display:flex;
    align-items:center;
    gap:10px;
    
    cursor:pointer;
    
    /* SOMBRAS 3D */
    box-shadow:
        inset 0 3px 6px rgba(255,255,255,0.25),
        inset 0 -4px 8px rgba(0,0,0,0.35),
        0 6px 14px rgba(0,0,0,0.45);
    
    transition:transform .15s ease, box-shadow .15s ease;
    
    overflow:hidden;
}

/* efecto presionado */
.promo-btn:active{
    transform:translateX(-50%) scale(.96);
    
    box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.45),
        0 3px 8px rgba(0,0,0,0.35);
}
  
  .promo-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.45),
        transparent
    );
    
    animation:shine 4s infinite;
}

@keyframes shine{
    0%{ left:-120%; }
    50%{ left:120%; }
    100%{ left:120%; }
}
  
  @keyframes pulseBtn{
    0%{ transform:translateX(-50%) scale(1); }
    50%{ transform:translateX(-50%) scale(1.07); }
    100%{ transform:translateX(-50%) scale(1); }
}

.promo-btn{
    animation:pulseBtn 3s infinite;
}
  
  .hand{
    font-size:18px;
    animation:handPop .8s ease;
}

@keyframes handPop{
    0%{
        transform:scale(0);
        opacity:0;
    }
    70%{
        transform:scale(1.3);
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}
  
</style>
</head>

<script>
const BUSINESS_ID = "negocio_demo_001";
const PASSWORD = "as123456";

firebase.initializeApp({
    apiKey: "AIzaSyA9LJQetXeU8LTIF8_SQHnYd0qHZBXlqDo",
    authDomain: "imagen-compartida.firebaseapp.com",
    databaseURL: "https://imagen-compartida-default-rtdb.firebaseio.com",
    projectId: "imagen-compartida"
});

const db = firebase.database();
const ref = db.ref("videos/" + BUSINESS_ID);
const colorRef = db.ref("colors/" + BUSINESS_ID);
const menuRef = db.ref("menuImages/" + BUSINESS_ID);


let logged = false;

function openLogin(){
    document.getElementById("adminModal").classList.add("active");
}

function closeModal(){
    document.getElementById("adminModal").classList.remove("active");
}

/* --- NUEVAS FUNCIONES PARA EL MODAL DE IMAGEN --- */
function openImageModal(){
    document.getElementById("imageModal").classList.add("active");
}

function closeImageModal(){
    document.getElementById("imageModal").classList.remove("active");
}
/* ------------------------------------------------ */

function showMsg(t){
    const m=document.getElementById("msg");
    m.textContent=t;
    m.classList.add("show");
}

function adminAction(){
    const pass=document.getElementById("password");
    const link=document.getElementById("videoLink");
    const colorBtn=document.getElementById("colorBtn");
    const bgBtn = document.getElementById("bgBtn");
    const menuBtn = document.getElementById("menuBtn");

    if(!logged){
        if(pass.value!==PASSWORD){
            showMsg("❌ Contraseña incorrecta");
            return;
        }

        logged=true;
        pass.style.display="none";
        link.style.display="block";
        document.getElementById("changeTitle").style.display="block";
        colorBtn.style.display="block";
        bgBtn.style.display="block";
        menuBtn.style.display="block";

        showMsg("✔ Acceso concedido");
        return;
    }

    const url=link.value.trim();

    // Si el campo está vacío, no hacemos nada (por si solo querían cambiar color o imagen)
    if(url === "") {
        closeModal();
        return;
    }

    if(!url.includes("youtube.com") && !url.includes("youtu.be")){
        showMsg("⚠️ Solo enlaces de YouTube");
        return;
    }

    ref.set(url);
    closeModal();
    link.value="";
}

/* LÓGICA PARA CONVERTIR IMAGEN A BASE64 Y SUBIR */
function convertBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

async function uploadBg(input) {
    if (input.files && input.files[0]) {
        try {
            const base64 = await convertBase64(input.files[0]);
            // Reemplazamos el video con la imagen
            ref.set(base64);
            showMsg("✔ Fondo cambiado a Imagen");
            setTimeout(closeModal, 1000);
        } catch(e) {
            showMsg("❌ Error al subir");
        }
    }
}

async function uploadMenu(input) {
    if (input.files && input.files[0]) {
        try {
            const base64 = await convertBase64(input.files[0]);
            // Guardamos en la referencia de menú
            menuRef.set(base64);
            showMsg("✔ Menú actualizado");
            setTimeout(closeModal, 1000);
        } catch(e) {
            showMsg("❌ Error al subir");
        }
    }
}

function togglePalette(){
    const p=document.getElementById("colorPalette");
    p.style.display = p.style.display==="flex" ? "none" : "flex";
}
  
// GUARDAR COLOR EN FIREBASE
document.querySelectorAll(".color").forEach(c=>{
    c.onclick = () => {
        const color = c.dataset.color;
        colorRef.set(color);
    };
});
  
// PINTAR VISUALMENTE LA PALETA
document.querySelectorAll(".color").forEach(c=>{
    c.style.background = c.dataset.color;
});

// ESCUCHAR COLOR EN TODOS LOS DISPOSITIVOS
colorRef.on("value", snap=>{
    const color = snap.val();
    if(!color) return;

    // Cambios originales (botones y fondo general)
    document.querySelector(".bottom-container").style.background = color;
  const promoBtn = document.querySelector(".promo-btn");
if(promoBtn) promoBtn.style.background = color;
    document.querySelector(".admin-btn").style.background = color;

    // --- NUEVOS CAMBIOS SOLICITADOS ---
    
    // 1. Botones (Cambiar color, Guardar, Reservar, NUEVOS BOTONES)
    const btnColor = document.getElementById("colorBtn");
    if(btnColor) btnColor.style.background = color;
    
    const btnBg = document.getElementById("bgBtn");
    if(btnBg) btnBg.style.background = color;

    const btnMenu = document.getElementById("menuBtn");
    if(btnMenu) btnMenu.style.background = color;

    const btnGuardar = document.querySelector(".modal-actions button"); // Primer botón (Guardar)
    if(btnGuardar) btnGuardar.style.background = color;

    const btnReservar = document.querySelector(".reserve-btn");
    if(btnReservar) btnReservar.style.background = color;

    // 2. Fondos de Modales (Admin, Imagen, Reserva, Info)
    const modals = [
        document.getElementById("adminModal"),
        document.getElementById("imageModal"),
        document.getElementById("reserveModal"),
        document.getElementById("infoModal")
    ];

    modals.forEach(m => {
        if(m) {
            // Aseguramos que no tenga color de fondo directo
            m.style.background = "transparent";
            // Pasamos el color a la variable CSS
            m.style.setProperty('--modal-bg', color);
        }
    });
});

// ESCUCHAR MENU/OFERTA (ICONO 2)
menuRef.on("value", snap=>{
    const imgData = snap.val();
    if(imgData){
        const imgTag = document.querySelector("#imageModal img");
        if(imgTag) imgTag.src = imgData;
    }
});

// ESCUCHAR VIDEO O IMAGEN DE FONDO
ref.on("value", snap=>{
    const url=snap.val();
    if(!url) return;
    
    const container = document.getElementById("videoContainer");

    // Detectar si es Imagen (Base64)
    if(url.startsWith("data:image")) {
        container.innerHTML = `<img src="${url}" alt="Background">`;
    } else {
        // Es Video de YouTube
        let id="";
        if(url.includes("watch?v=")) id=url.split("watch?v=")[1].split("&")[0];
        else if(url.includes("youtu.be/")) id=url.split("youtu.be/")[1].split("?")[0];
        else if(url.includes("/shorts/")) id=url.split("/shorts/")[1].split("?")[0];

        container.innerHTML=
        `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=0&rel=0" allow="autoplay"></iframe>`;
    }
});
